<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,minimal-ui">
<title>Tower Stacker</title>
<link rel="icon" type="image/x-icon" href="./assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0}
img{width:100%}
html{background:#0a0a0a;height:100%}
body{font-family:"Helvetica Neue",Arial,Helvetica,sans-serif;margin:0 auto;text-align:center;width:100%;height:100%;background:radial-gradient(ellipse 80% 60% at 50% 40%, #1a0b0f 0%, #0a0a0a 100%);overflow:hidden}
@media screen and (min-height:560px){html{font-size:100px}}
@media screen and (min-height:640px){html{font-size:112.5px}}
@media screen and (min-height:720px){html{font-size:125px}}
@media screen and (min-height:800px){html{font-size:137.5px}}
@media screen and (min-height:880px){html{font-size:150px}}
@media screen and (min-height:960px){html{font-size:162.5px}}
@media screen and (min-height:1040px){html{font-size:180px}}
@media screen and (min-height:1200px){html{font-size:200px}}
html{font-size:17.6vh}
#canvas{position:fixed;left:0;top:0;right:0;bottom:0;margin:auto}
a{text-decoration:none}
li,ol,ul{list-style-type:none;padding:0;margin:0}
.hide{display:none}
.clear{clear:both}
.loading{background:radial-gradient(ellipse 70% 50% at 50% 40%, #1a0b0f 0%, #0a0a0a 100%);height:100%;width:100%;display:flex;align-items:center;justify-content:center}
.loading .main{width:70%;margin:0 auto;color:#ededed}
.loading .main img{width:50%;margin:0 auto 1rem;opacity:.9}
.loading .main .title{font-size:.3rem;color:#ef4444;font-weight:700;letter-spacing:.05em}
.loading .main .text{font-size:.15rem;color:#888;letter-spacing:.1em;text-transform:uppercase}
.loading .main .bar{height:.12rem;width:100%;border:2px solid #1a1a1a;border-radius:.6rem;margin:.1rem 0;background:#0d0d0d;overflow:hidden}
.loading .main .bar .sub{height:.1rem;width:98%;margin:.008rem auto 0}
.loading .main .bar .percent{height:100%;width:0;background:linear-gradient(90deg,#b91c1c,#ef4444);border-radius:.6rem;box-shadow:0 0 12px rgba(239,68,68,.6)}
.loading .logo{position:absolute;bottom:.3rem;left:0;right:0}
.loading .logo img{width:1rem}
.content{height:100vh;margin:0 auto;position:relative}
.landing .title{width:60%}
.landing .logo{width:30%;position:absolute;right:.2rem;top:.2rem}
.landing .action-2{position:absolute;bottom:.2rem;width:100%}
.landing .start{width:65%;cursor:pointer}
.slideTop{-webkit-animation:st 1s ease-in-out;animation:st 1s ease-in-out}
@-webkit-keyframes st{0%{transform:translateZ(0)}100%{transform:translate3d(0,-100%,0)}}
@keyframes st{0%{transform:translateZ(0)}100%{transform:translate3d(0,-100%,0)}}
.slideBottom{-webkit-animation:sb 1s ease-in-out;animation:sb 1s ease-in-out}
@-webkit-keyframes sb{0%{transform:translateZ(0)}100%{transform:translate3d(0,200%,0)}}
@keyframes sb{0%{transform:translateZ(0)}100%{transform:translate3d(0,200%,0)}}
.swing{-webkit-animation:sw 2s ease-in-out alternate infinite;animation:sw 2s ease-in-out alternate infinite}
@-webkit-keyframes sw{0%{transform:rotate(5deg);transform-origin:top center}100%{transform:rotate(-5deg);transform-origin:top center}}
@keyframes sw{0%{transform:rotate(5deg);transform-origin:top center}100%{transform:rotate(-5deg);transform-origin:top center}}
.modal .mask{background-color:#000;opacity:.6;position:fixed;height:100%;width:100%;top:0;left:0}
.modal .modal-content{position:fixed;height:100%;width:90%;margin-top:.3rem;top:0}
.modal .main{width:85%;margin:0 auto}
.modal .container{position:relative}
.modal .bg{width:100%;position:absolute;top:0;left:0}
.modal .modal-main{width:100%;position:absolute;top:0;left:0;margin-top:-.4rem}
.modal .over-img{width:80%;margin:.8rem auto 0}
.modal .over-score{margin-top:-.2rem;font-size:.5rem;color:#ff735c;text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff}
.modal .tip{font-size:.16rem;color:#9b724e}
.modal .over-button-b{width:70%;margin:.1rem auto 0;cursor:pointer}
@font-face{font-family:wenxue;src:url(assets/wenxue.eot);src:url(assets/wenxue.eot),url(assets/wenxue.woff),url(assets/wenxue.ttf),url(assets/wenxue.svg)}
.font-wenxue{font-family:wenxue}

/* ── Hand-drawn title treatment ─────────────────────────────── */
.tower-title-wrap{position:relative;display:inline-block;padding:.15rem .35rem;transform-origin:top center}
.tower-title{font-family:"Bagel Fat One",system-ui,cursive;color:#fef6e4;font-size:.98rem;line-height:.92;letter-spacing:.015em;margin:0;text-shadow:-4px -4px 0 #b91c1c,4px -4px 0 #b91c1c,-4px 4px 0 #b91c1c,4px 4px 0 #b91c1c,-4px 0 0 #b91c1c,4px 0 0 #b91c1c,0 -4px 0 #b91c1c,0 4px 0 #b91c1c,0 8px 0 rgba(0,0,0,.32),0 1px 0 #b91c1c}
.tower-title .tl{display:inline-block}
.tower-title .tl:nth-child(3n+1){transform:rotate(-3deg)}
.tower-title .tl:nth-child(3n+2){transform:rotate(2deg)}
.tower-title .tl:nth-child(3n+3){transform:rotate(-1.5deg) translateY(-2px)}
.tower-doodle{position:absolute;pointer-events:none;color:#fef6e4}
.doodle-1{top:-.15rem;left:-.2rem;width:.28rem;height:.28rem;transform:rotate(-18deg)}
.doodle-2{top:.05rem;right:-.22rem;width:.22rem;height:.22rem;transform:rotate(22deg)}
.doodle-3{bottom:-.1rem;left:.1rem;width:.18rem;height:.18rem;transform:rotate(12deg)}
.tower-annotation{font-family:"Caveat",cursive;color:#fef6e4;font-size:.24rem;font-weight:700;letter-spacing:.06em;margin-bottom:.08rem;text-shadow:0 2px 4px rgba(0,0,0,.35),0 0 1px rgba(185,28,28,.6)}
</style>
</head>
<body>
<canvas id="canvas" class="hide"></canvas>
<div class="content">
  <div class="loading">
    <div class="main">
      <img src="./assets/main-loading.gif">
      <div class="progress">
        <div class="title font-wenxue">0%</div>
        <div class="bar"><div class="sub"><div class="percent"></div></div></div>
        <div class="text">Loading...</div>
      </div>
    </div>
  </div>
  <div class="landing hide">
    <div class="action-1">
      <div class="swing tower-title-wrap">
        <div class="tower-title">
          <span class="tl">T</span><span class="tl">O</span><span class="tl">W</span><span class="tl">E</span><span class="tl">R</span>
        </div>
        <div class="tower-title" style="margin-top:.02rem">
          <span class="tl">S</span><span class="tl">T</span><span class="tl">A</span><span class="tl">C</span><span class="tl">K</span><span class="tl">E</span><span class="tl">R</span>
        </div>
        <svg class="tower-doodle doodle-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L14 10 L21 11 L15.5 14.5 L17 21 L12 17 L7 21 L8.5 14.5 L3 11 L10 10 Z"/></svg>
        <svg class="tower-doodle doodle-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 4 L12 20 M4 12 L20 12 M6 6 L18 18 M18 6 L6 18"/></svg>
        <svg class="tower-doodle doodle-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L13.5 10.5 L21 12 L13.5 13.5 L12 21 L10.5 13.5 L3 12 L10.5 10.5 Z"/></svg>
      </div>
    </div>
    <div class="action-2">
      <div class="tower-annotation">↓ tap to play! ↓</div>
      <img id="start" src="./assets/main-index-start.png" class="start">
    </div>
  </div>
  <div id="modal" class="modal hide">
    <div class="mask"></div>
    <div class="js-modal-content modal-content">
      <div class="main">
        <div class="container">
          <img src="./assets/main-modal-bg.png" class="bg">
          <div class="modal-main">
            <div id="over-modal" class="hide js-modal-card">
              <img src="./assets/main-modal-over.png" class="over-img">
              <div id="score" class="over-score font-wenxue"></div>
              <div id="over-zero" class="hide">
                <div class="tip">
                  <p>Try Again!</p>
                  <img src="./assets/main-modal-again-b.png" class="over-button-b js-reload">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="./dist/main.js"></script>
<script src="./assets/zepto-1.1.6.min.js"></script>
<script>
var domReady, loadFinish, canvasReady, loadError, gameStart, game, score = 0, successCount = 0;
var blocks = 0, perfects = 0, bestStreak = 0;
var MILESTONES = [10, 25, 50, 100, 200, 500, 1000];

function postParent(type, data) {
  try {
    var payload = { type: type };
    if (data) for (var k in data) payload[k] = data[k];
    window.parent.postMessage(payload, '*');
  } catch (e) {}
}

// Size the game to fill the iframe viewport, preserving a 3:2 portrait ratio.
var gameWidth = window.innerWidth;
var gameHeight = window.innerHeight;
var ratio = 1.5;
if (gameHeight / gameWidth < ratio) {
  gameWidth = Math.ceil(gameHeight / ratio);
}
$('.content').css({ "height": gameHeight + "px", "width": gameWidth + "px" });
$('.js-modal-content').css({ "width": gameWidth + "px" });

function hideLoading() {
  if (domReady && canvasReady) {
    $('#canvas').show();
    loadFinish = true;
    setTimeout(function () {
      $('.loading').hide();
      $('.landing').show();
      postParent('ts:ready');
    }, 1000);
  }
}

function updateLoading(status) {
  var success = status.success;
  var total = status.total;
  var failed = status.failed;
  if (failed > 0 && !loadError) {
    loadError = true;
    alert('Network error... Please try again.');
    return;
  }
  var percent = parseInt((success / total) * 100);
  if (percent === 100 && !canvasReady) {
    canvasReady = true;
    hideLoading();
  }
  percent = percent > 98 ? 98 : percent;
  percent = percent + '%';
  $('.loading .title').text(percent);
  $('.loading .percent').css({ 'width': percent });
}

function overShowOver() {
  $('#modal').show();
  $('#over-modal').show();
  $('#over-zero').show();
}

// ── Synthesized audio (replaces upstream low-bitrate samples) ──────────
var actx, master, bgmBus, delayIn, noiseBuf;
var bgmRunning = false, bgmTimer = null;
var prevScore = 0, prevSuccess = 0, audioUnlocked = false;

function ensureAudio() {
  if (actx) return actx;
  var AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  actx = new AC();

  master = actx.createGain();
  master.gain.value = 0.8;
  master.connect(actx.destination);

  // Shared feedback delay (adds space / reverb tail to pads & bells)
  var delay = actx.createDelay(1.5);
  delay.delayTime.value = 0.38;
  var fb = actx.createGain();
  fb.gain.value = 0.34;
  var dampen = actx.createBiquadFilter();
  dampen.type = 'lowpass';
  dampen.frequency.value = 2000;
  delay.connect(dampen).connect(fb).connect(delay);
  var wet = actx.createGain();
  wet.gain.value = 0.55;
  delay.connect(wet).connect(master);
  delayIn = delay;

  bgmBus = actx.createGain();
  bgmBus.gain.value = 0;
  bgmBus.connect(master);

  // Pre-built pink-ish noise buffer (reused across SFX)
  var len = actx.sampleRate * 2;
  noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
  var d = noiseBuf.getChannelData(0);
  var b0 = 0, b1 = 0, b2 = 0;
  for (var i = 0; i < len; i++) {
    var w = Math.random() * 2 - 1;
    b0 = 0.99765 * b0 + w * 0.0990460;
    b1 = 0.96300 * b1 + w * 0.2965164;
    b2 = 0.57000 * b2 + w * 1.0526913;
    d[i] = (b0 + b1 + b2 + w * 0.1848) * 0.15;
  }
  return actx;
}

function unlockAudio() {
  var c = ensureAudio();
  if (c && c.state === 'suspended') c.resume();
  audioUnlocked = true;
}

// Warm wooden thud: pitch-dropping sine + bandpass noise transient
function playDrop() {
  var c = ensureAudio(); if (!c) return;
  var t = c.currentTime;
  var osc = c.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(190, t);
  osc.frequency.exponentialRampToValueAtTime(55, t + 0.2);
  var g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.42, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
  osc.connect(g).connect(master);
  osc.start(t); osc.stop(t + 0.35);

  var n = c.createBufferSource();
  n.buffer = noiseBuf;
  n.playbackRate.value = 0.8 + Math.random() * 0.2;
  var nf = c.createBiquadFilter();
  nf.type = 'bandpass';
  nf.frequency.value = 720;
  nf.Q.value = 1.2;
  var ng = c.createGain();
  ng.gain.setValueAtTime(0.22, t);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
  n.connect(nf).connect(ng).connect(master);
  n.start(t); n.stop(t + 0.1);
}

// Bright bell (not chiptune): triangle harmonic stack + sine sparkle, with delay send
function playPerfect() {
  var c = ensureAudio(); if (!c) return;
  var t = c.currentTime;
  var fund = 659.25; // E5
  var harmonics = [1, 2.01, 2.96, 4.03];
  var gains = [0.22, 0.13, 0.07, 0.035];
  harmonics.forEach(function (h, i) {
    var osc = c.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = fund * h;
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gains[i], t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.1 - i * 0.18);
    osc.connect(g);
    g.connect(master);
    g.connect(delayIn);
    osc.start(t); osc.stop(t + 1.3);
  });
  var spark = c.createOscillator();
  spark.type = 'sine';
  spark.frequency.value = fund * 6;
  var sg = c.createGain();
  sg.gain.setValueAtTime(0.0001, t);
  sg.gain.exponentialRampToValueAtTime(0.07, t + 0.003);
  sg.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  spark.connect(sg).connect(master);
  spark.start(t); spark.stop(t + 0.25);
}

// Cinematic descent: detuned saws sweeping down through LPF + low boom
function playFail() {
  var c = ensureAudio(); if (!c) return;
  var t = c.currentTime;
  [0, -11, 11].forEach(function (detune) {
    var osc = c.createOscillator();
    osc.type = 'sawtooth';
    osc.detune.value = detune;
    osc.frequency.setValueAtTime(330, t);
    osc.frequency.exponentialRampToValueAtTime(58, t + 0.9);
    var f = c.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(2400, t);
    f.frequency.exponentialRampToValueAtTime(240, t + 0.9);
    f.Q.value = 4;
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.15, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
    osc.connect(f).connect(g);
    g.connect(master);
    g.connect(delayIn);
    osc.start(t); osc.stop(t + 1.05);
  });
  var boom = c.createOscillator();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(90, t);
  boom.frequency.exponentialRampToValueAtTime(34, t + 0.55);
  var bg = c.createGain();
  bg.gain.setValueAtTime(0.0001, t);
  bg.gain.exponentialRampToValueAtTime(0.38, t + 0.01);
  bg.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
  boom.connect(bg).connect(master);
  boom.start(t); boom.stop(t + 0.9);
}

// Ambient pad BGM: slow 4-chord loop, unison saws through LPF with delay send
var CHORDS = [
  [220.00, 261.63, 329.63], // Am
  [174.61, 220.00, 261.63], // F
  [196.00, 246.94, 293.66], // G
  [164.81, 207.65, 246.94]  // Em-ish
];

function playChord(freqs, duration) {
  var c = ensureAudio(); if (!c) return;
  var t = c.currentTime;
  freqs.forEach(function (f) {
    [-9, 0, 9].forEach(function (detune) {
      var osc = c.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      osc.detune.value = detune;
      var filt = c.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.setValueAtTime(850, t);
      filt.frequency.linearRampToValueAtTime(1400, t + 2.5);
      filt.frequency.linearRampToValueAtTime(850, t + duration);
      filt.Q.value = 1.4;
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.032, t + 1.6);
      g.gain.setValueAtTime(0.032, t + Math.max(1.6, duration - 1.8));
      g.gain.linearRampToValueAtTime(0.0001, t + duration);
      osc.connect(filt).connect(g);
      g.connect(bgmBus);
      g.connect(delayIn);
      osc.start(t); osc.stop(t + duration + 0.1);
    });
  });
}

function startBgm() {
  var c = ensureAudio(); if (!c) return;
  if (bgmRunning) return;
  bgmRunning = true;
  var t = c.currentTime;
  bgmBus.gain.cancelScheduledValues(t);
  bgmBus.gain.setValueAtTime(bgmBus.gain.value, t);
  bgmBus.gain.linearRampToValueAtTime(0.55, t + 2.5);

  var idx = 0;
  var chordLen = 6.0;
  function nextChord() {
    if (!bgmRunning) return;
    playChord(CHORDS[idx % CHORDS.length], chordLen);
    idx++;
    bgmTimer = setTimeout(nextChord, (chordLen - 0.5) * 1000);
  }
  nextChord();
}

function stopBgm(fadeSec) {
  if (!bgmRunning) return;
  bgmRunning = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
  if (actx && bgmBus) {
    var t = actx.currentTime;
    bgmBus.gain.cancelScheduledValues(t);
    bgmBus.gain.setValueAtTime(bgmBus.gain.value, t);
    bgmBus.gain.linearRampToValueAtTime(0.0001, t + (fadeSec || 1.2));
  }
}

var option = {
  width: gameWidth,
  height: gameHeight,
  canvasId: 'canvas',
  soundOn: false,
  setGameScore: function (s) {
    var delta = s - prevScore;
    prevScore = s;
    score = s;
    if (delta > 0) {
      // Defer so setGameSuccess (which may fire in the same tick) updates first.
      setTimeout(function () {
        var wasPerfect = successCount > prevSuccess;
        prevSuccess = successCount;
        if (audioUnlocked) { if (wasPerfect) playPerfect(); else playDrop(); }
        blocks++;
        if (wasPerfect) perfects++;
        if (successCount > bestStreak) bestStreak = successCount;
        postParent('ts:score', {
          score: s, blocks: blocks, streak: successCount,
          bestStreak: bestStreak, perfects: perfects, perfect: wasPerfect
        });
        if (MILESTONES.indexOf(blocks) !== -1) {
          postParent('ts:milestone', { blocks: blocks });
        }
      }, 0);
    }
  },
  setGameSuccess: function (s) { successCount = s; },
  setGameFailed: function (f) {
    $('#score').text(score);
    if (audioUnlocked) playFail();
    postParent('ts:fail', { fails: f });
    if (f >= 3) {
      stopBgm(1.0);
      postParent('ts:gameover', {
        score: score, blocks: blocks,
        bestStreak: bestStreak, perfects: perfects
      });
      // Upstream modal suppressed — parent renders its own game-over card.
    }
  }
};

function gameReady() {
  game = TowerGame(option);
  game.load(function () {
    game.init();
  }, updateLoading);
}

gameReady();

function indexHide() {
  $('.landing .action-1').addClass('slideTop');
  $('.landing .action-2').addClass('slideBottom');
  setTimeout(function () { $('.landing').hide(); }, 950);
}

$('#start').on('click', function () {
  if (gameStart) return;
  gameStart = true;
  unlockAudio();
  startBgm();
  indexHide();
  postParent('ts:started');
  setTimeout(game.start, 400);
});

$('.js-reload').on('click', function () {
  window.location.reload();
});

window.addEventListener('load', function () {
  domReady = true;
  hideLoading();
}, false);
</script>
</body>
</html>
